server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/srl?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: srl
    password: srlpass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace