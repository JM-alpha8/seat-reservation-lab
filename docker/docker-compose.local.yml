services:
  mysql:
    image: mysql:8.0
    container_name: srl-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: srl
      MYSQL_USER: srl
      MYSQL_PASSWORD: srlpass
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - srl_mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: srl-redis
    ports:
      - "6379:6379"

volumes:
  srl_mysql_data: